<!DOCTYPE html>
<html lang=\"en\">

<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>Backrooms Translations!</title>
</head>

<body>
    <script type="text/javascript">
        let queries = {};
        window.location.search.split("?")[1]?.split("&").forEach(query => {
            queries[query.split("=")[0]] = query.split("=")[1];
        });
        fetch("https://ayyqayxroldkohmgtgws.supabase.co/functions/v1/database-access", {
            method: "GET",
            headers: {
                "site": queries["site"] ?? "",
                "url": queries["url"] ?? "",
                "branch": queries["branch"] ?? "",
                "theme": queries["theme"] ?? ""
            }
        }).then(async (response) => {
            document.body.innerHTML = await response.text();
        });
    </script>
</body>

</html>
